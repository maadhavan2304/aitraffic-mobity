version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - traffic-db:/app
    environment:
      - DATABASE_URL=sqlite:///./traffic.db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  traffic-db:
